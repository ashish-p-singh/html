<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Webpage</title>
<style>
body{
    margin: 0;
}
header{
    background-color: #333;
    text-align: center;
    padding: 10px 0;
}
header h1{
    color: white;
    padding: 2px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
}
nav a{
    text-decoration: none;
    color: white;
    padding: 12px 20px;
    margin-bottom: 10px;
}
main{
    padding: 10px;
    min-height: 80vh;
    background-color: #f4f4f4;
}

.content-box{
    background-color: white;
    padding: 15px;
    margin : 10px 0;
    border-radius : 5px;
    box-shadow : 0 2px 5px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
footer{
    background-color: #333;
    color: white;
    text-align: center;
    padding: 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>
<body>
<header>
<h1>Welcome to My Webpage</h1>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>
<main>
<div class="content-box">
<h2>About This Page</h2>
<p>This is a simple webpage to demonstrate styling and linking.</p>
<p><a href="https://example.com" target="_blank">Visit Example.com</a></p>
</div>
</main>
<footer>
&copy; 2024 My Webpage
</footer>
</body>
</html>
