<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=per, initial-scale=1.0">
    <title>Document</title>
    <style>
        .form{
            color: brown;
            border : 2px black solid;
            border-radius: 10px;
         box-shadow: 5px 10px 18px hsl(0, 13%, 75%);
         margin: 0px 0px 10px 0px;
        }
        input{
            border-color: blue;
            border-radius: 5px;
            color: brown;
        }
        .container{
            display: flex;
        }
        .left{
            flex: 1;
            background-color: orange;
            padding: 10px;
            height: 84vh;
        }
        .right{
            flex: 1;
            background-color: green;
            padding: 10px;
        }
    </style>
</head>
<body>
    Personal details
    <div class="form">
    <form action="get">
        <label for="name">Name:- </label>
        <input type="text" name="name" value="" placeholder="Enter your name">
        <br>
        <label for="mothers name">Mothers name:-</label>
        <input type="text" name="mothers name" value="" placeholder="Enter your mothers name">
    </form>
    </div>
    <div class="container">
        <div class="left">
        <img src="img.avif" alt="picture not found"
        height="100px" width="100px">
        <br>
        <img src="img.avif" alt="" width="100" height="100"
        style="border-radius: 50%;" >
    </div>
    <div class="right">
      <button onclick="Auth()">Authentication Check</button>
    </div>
    </div>
    <script>
        function Auth(){
            const name=document.getElementsByName("name")[0].value;
            const mothername=document.getElementsByName("mothers name")[0].value;
            if(!name || !mothername){
                alert("Please fill all the details");
            }
            else{
           const expName="Ashish";
           const expMotherName="xyz";
           if(name===expName && mothername===expMotherName){
            alert("Authentication Successful✅");
           }
           else{
            alert("Authentication Failed❌");
           }    
        }
        }
    </script>
</body>
</html>
