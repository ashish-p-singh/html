
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="fifth.html" target="_self" method="get">
        <label for="fname">First Name:</label>
        <input type="text" id="name" name="fname" placeholder="Enter your name"><br>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" placeholder="Enter your last name"><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br>
        <label for="radio">Choose your web language</label><br>
        <input type="radio" id="html" name="web language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="css" name="web language" value="CSS">
        <label for="css">CSS</label><br>
        <input type="radio" id="js" name="web language" value="JS">
        <label for="js">JS</label><br>

        <label for="hobbies">Select your hobbies</label>
        <input type="checkbox" id="hobbies" name="hobbies" placeholder="Enter your hobbies"><br>
        <label for="Reading">Reading books</label>
        <input type="checkbox" id="Reading" name="Reading" value="Reading books"><br>
        <label for="listening">Listening music</label>
        <input type="checkbox" id="listening" name="listening" value="listening"><br>
        <label for="dancing">Dancing</label>
        <input type="checkbox" id="dancing" name="dancing" value="dancing"><br>
        <label for="traveling">Traveling</label>
        <input type="checkbox" id="traveling" name="traveling" value="traveling"><br>
        <label for="Country">Select Country</label>
        <select id="Country" name="Country">
            <option value="India">India</option>
            <option value="USA">Russia</option>
            <option value="UK">Angola</option>
            <option value="Canada">papua new guinea</option>
            <option value="Australia">french polynesia</option>
        </select><br>

        <label for="address">Address</label>
        <textarea name="address" id="Adress" cols="10" rows="6"
            placeholder="Enter the residential adress"></textarea><br>
        <label for="doxument">Upload Document</label>
        <input type="file" id="document" name="document"><br>
        <input type="submit" value="Submit"><br>
        <input type="reset" value="Reset"><br>
    </form>
</body>

</html>
